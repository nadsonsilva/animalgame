# Nome da aplicação
spring.application.name=animalgame-backend

# Configurações do DataSource para conectar ao banco MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/animalgame?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialeto do Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL5Dialect

# HikariCP (Pool de Conexões)
spring.datasource.hikari.maximum-pool-size=10

# Habilitar o DDL auto
spring.jpa.hibernate.ddl-auto=update

# Mostrar o SQL no log
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garantir execução do data.sql após criação/atualização das tabelas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

jwt.secret=animalgame-chave-secreta-super-segura-2026-animalgame
jwt.expiration=86400000